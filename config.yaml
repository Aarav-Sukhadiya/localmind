# LLM Connection
llm:
  backend: "llama_cpp"            # "llama_cpp" or "lm_studio"
  base_url: "http://localhost:8080/v1"
  model: "ministral-3b"
  api_key: "not-needed"
  temperature: 0.7
  max_tokens: 2048
  multiplexing:
    enabled: true
    small_model_url: "http://localhost:8080/v1"
    small_model_name: "ministral-3b"
    large_model_url: "http://localhost:8081/v1"
    large_model_name: "qwen-35b"

# Context Window
context:
  max_tokens: 8192                # Match your model's context length
  token_counter: "tiktoken"       # "tiktoken" or "approximate"
  prune_strategy: "compact"       # "oldest_first" or "compact"
  compaction_threshold: 0.8       # When context is 80% full, auto-compact

# Tools
tools:
  shell:
    enabled: true
    timeout: 30
    blocked_commands: ["rm -rf /", "mkfs", "dd", ":(){:|:&};:"]
  python:
    enabled: true
    timeout: 60
  file:
    enabled: true
    base_directory: "~/localmind_workspace/"
  web_search:
    enabled: true
    provider: "duckduckgo"        # "duckduckgo" or "searxng"
    searxng_url: "http://localhost:8888"
  memory:
    enabled: true

# Memory
memory:
  backend: "chromadb"             # "sqlite" or "chromadb"
  db_path: "data/memory.db"       # path for sqlite, dir for chromadb
  auto_inject: true               # Auto-inject relevant memories into context
  auto_inject_limit: 3            # Max memories to inject per turn

# Server
server:
  host: "0.0.0.0"
  port: 8000
